<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA 3PT% Forecaster</title>
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.9/umd/Recharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --court:#C8973A; --ink:#0D0D0D; --off:#F7F4EE; --mid:#E8E3D9; --dim:#8A8375; --line:#D4CFC4; --hit:#1A6B3C; --miss:#B83232; --card-bg:#FFFFFF; }
    body { font-family: 'Inter', sans-serif; background: var(--off); color: var(--ink); min-height: 100vh; }
    .site-header { background: var(--ink); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; border-bottom: 3px solid var(--court); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--court); letter-spacing: 0.06em; }
    .logo span { color: #fff; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { background: none; border: none; color: #aaa; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
    .nav-tab.active { color: var(--court); background: rgba(200,151,58,0.12); }
    .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .hero-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 32px; }
    .hero-stat { background: var(--card-bg); padding: 20px 24px; display: flex; flex-direction: column; gap: 4px; }
    .hero-stat__label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
    .hero-stat__value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--court); line-height: 1; }
    .hero-stat__sub { font-size: 0.72rem; color: var(--dim); }
    .cols { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
    .card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 10px; padding: 28px; }
    .card__title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 0.06em; color: var(--ink); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--court); display: inline-block; }
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--line); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 0.95rem; background: var(--off); }
    .search-input:focus { outline: none; border-color: var(--court); }
    .dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1.5px solid var(--line); border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .dropdown-item { padding: 10px 16px; cursor: pointer; font-size: 0.9rem; }
    .dropdown-item:hover { background: var(--off); }
    .btn-predict { width: 100%; padding: 13px; background: var(--court); color: var(--ink); border: none; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer; margin-top: 4px; }
    .btn-predict:hover { opacity: 0.88; }
    .btn-predict:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-badge { margin-top: 20px; padding: 20px; border-radius: 8px; background: var(--off); border: 1.5px solid var(--line); text-align: center; }
    .result-pct { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--court); line-height: 1; }
    .result-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-top: 4px; }
    .result-player { font-size: 0.9rem; font-weight: 600; margin-top: 8px; }
    .chart-wrap { height: 280px; width: 100%; }
    .empty-state { height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--dim); }
    .empty-ball { font-size: 2.5rem; opacity: 0.3; }
    .empty-text { font-size: 0.85rem; text-align: center; max-width: 200px; line-height: 1.5; }
    .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
    .history-table th { text-align: left; padding: 8px 12px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); border-bottom: 2px solid var(--line); }
    .history-table td { padding: 9px 12px; border-bottom: 1px solid var(--mid); font-family: 'JetBrains Mono', monospace; }
    .history-table tr:last-child td { border-bottom: none; }
    .diff-pos { color: var(--hit); font-weight: 600; }
    .diff-neg { color: var(--miss); font-weight: 600; }
    .feat-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .feat-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
    .feat-name { width: 160px; font-weight: 500; flex-shrink: 0; }
    .feat-bar-bg { flex: 1; height: 6px; background: var(--mid); border-radius: 3px; overflow: hidden; }
    .feat-bar-fill { height: 100%; background: var(--court); border-radius: 3px; }
    .feat-val { width: 36px; text-align: right; color: var(--dim); font-size: 0.75rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { padding: 12px 16px; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 6px; color: var(--miss); font-size: 0.85rem; margin-top: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; background: var(--off); }
    .form-input:focus { outline: none; border-color: var(--court); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 800px) { .cols { grid-template-columns: 1fr; } .hero-strip { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var API = 'http://localhost:8000';
    var h = React.createElement;
    var RC = Recharts;

    var FEATURE_LABELS = {
      fg3_pct_career_avg: 'Career 3PT%',
      FG_PCT: 'FG% (overall)',
      fg3a_per_game: '3PA per game',
      high_volume: 'Volume shooter',
      FT_PCT: 'FT%',
      TOV: 'Turnovers',
      fg3_pct_lag2: '3PT% (2 yrs ago)',
      MIN: 'Minutes/game',
    };

    var IMPORTANCES = [
      { key: 'FG_PCT', val: 0.133 },
      { key: 'fg3_pct_career_avg', val: 0.126 },
      { key: 'fg3a_per_game', val: 0.112 },
      { key: 'high_volume', val: 0.084 },
      { key: 'FT_PCT', val: 0.074 },
      { key: 'TOV', val: 0.074 },
      { key: 'fg3_pct_lag2', val: 0.055 },
      { key: 'MIN', val: 0.049 },
    ];

    // ── PlayerTab ──────────────────────────────────────────────────────
    function PlayerTab(props) {
      var modelInfo = props.modelInfo;
      var qs = React.useState(''); var query = qs[0]; var setQuery = qs[1];
      var as = React.useState([]); var allPlayers = as[0]; var setAll = as[1];
      var fs = React.useState([]); var filtered = fs[0]; var setFiltered = fs[1];
      var ds = React.useState(false); var showDrop = ds[0]; var setShowDrop = ds[1];
      var ls = React.useState(false); var loading = ls[0]; var setLoading = ls[1];
      var ps = React.useState(null); var playerData = ps[0]; var setPlayer = ps[1];
      var es = React.useState(''); var error = es[0]; var setError = es[1];
      var wrapRef = React.useRef(null);

      React.useEffect(function() {
        fetch(API + '/players').then(function(r){ return r.json(); }).then(function(d){ setAll(d.players); }).catch(function(){});
        function handler(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setShowDrop(false); }
        document.addEventListener('mousedown', handler);
        return function() { document.removeEventListener('mousedown', handler); };
      }, []);

      function handleInput(val) {
        setQuery(val);
        if (val.length < 2) { setFiltered([]); setShowDrop(false); return; }
        var f = allPlayers.filter(function(p){ return p.toLowerCase().indexOf(val.toLowerCase()) !== -1; }).slice(0, 8);
        setFiltered(f); setShowDrop(f.length > 0);
      }

      function selectPlayer(name) {
        setQuery(name); setShowDrop(false); setLoading(true); setError(''); setPlayer(null);
        fetch(API + '/player/' + encodeURIComponent(name))
          .then(function(r){ if (!r.ok) throw new Error('Player not found'); return r.json(); })
          .then(function(d){ setPlayer(d); })
          .catch(function(e){ setError(e.message); })
          .finally(function(){ setLoading(false); });
      }

      var chartData = playerData ? playerData.history.map(function(hh) {
        return { season: hh.season, Actual: parseFloat((hh.actual_fg3_pct*100).toFixed(1)), Predicted: parseFloat((hh.predicted_fg3_pct*100).toFixed(1)) };
      }) : [];

      return h('div', { className: 'cols' },
        h('div', null,
          h('div', { className: 'card' },
            h('div', { className: 'card__title' }, 'Player Lookup'),
            h('div', { className: 'search-wrap', ref: wrapRef },
              h('input', { className: 'search-input', placeholder: 'Search player name...', value: query,
                onChange: function(e){ handleInput(e.target.value); },
                onFocus: function(){ if (filtered.length) setShowDrop(true); }
              }),
              showDrop && h('div', { className: 'dropdown' },
                filtered.map(function(p) {
                  return h('div', { key: p, className: 'dropdown-item', onMouseDown: function(){ selectPlayer(p); } }, p);
                })
              )
            ),
            h('button', { className: 'btn-predict', disabled: !query || loading, onClick: function(){ selectPlayer(query); } },
              loading ? h('span', { className: 'spinner' }) : 'Load Player'
            ),
            error && h('div', { className: 'error-msg' }, error),
            playerData && h('div', { className: 'result-badge' },
              h('div', { className: 'result-pct' }, (playerData.history[playerData.history.length-1].predicted_fg3_pct*100).toFixed(1) + '%'),
              h('div', { className: 'result-label' }, 'Latest Season Forecast'),
              h('div', { className: 'result-player' }, playerData.player)
            )
          ),
          h('div', { className: 'card', style: { marginTop: 20 } },
            h('div', { className: 'card__title' }, 'Model Info'),
            modelInfo && h('table', { className: 'history-table' },
              h('tbody', null,
                h('tr', null, h('td', { style:{color:'var(--dim)'} }, 'Type'), h('td', null, 'XGBoost Regressor')),
                h('tr', null, h('td', { style:{color:'var(--dim)'} }, 'MAE'), h('td', null, (modelInfo.mae*100).toFixed(2) + ' pts')),
                h('tr', null, h('td', { style:{color:'var(--dim)'} }, 'R2'), h('td', null, modelInfo.r2.toFixed(3))),
                h('tr', null, h('td', { style:{color:'var(--dim)'} }, 'Train rows'), h('td', null, modelInfo.training_rows)),
                h('tr', null, h('td', { style:{color:'var(--dim)'} }, 'Seasons'), h('td', null, '2014-15 to 2023-24'))
              )
            )
          )
        ),
        h('div', { className: 'card' },
          h('div', { className: 'card__title' }, playerData ? playerData.player + ' - Actual vs Predicted 3PT%' : 'Season History'),
          !playerData
            ? h('div', { className: 'empty-state' },
                h('div', { className: 'empty-ball' }, '🏀'),
                h('div', { className: 'empty-text' }, 'Search for a player to see their 3PT% forecast across seasons')
              )
            : h('div', null,
                h('div', { className: 'chart-wrap' },
                  h(RC.ResponsiveContainer, { width: '100%', height: '100%' },
                    h(RC.LineChart, { data: chartData, margin: {top:8,right:16,left:0,bottom:0} },
                      h(RC.CartesianGrid, { strokeDasharray: '3 3', stroke: '#E8E3D9' }),
                      h(RC.XAxis, { dataKey: 'season', tick: {fontSize:11,fill:'#8A8375'} }),
                      h(RC.YAxis, { domain: ['auto','auto'], tickFormatter: function(v){ return v+'%'; }, tick: {fontSize:11,fill:'#8A8375'} }),
                      h(RC.Tooltip, { formatter: function(v){ return v+'%'; } }),
                      h(RC.Legend, null),
                      h(RC.Line, { type: 'monotone', dataKey: 'Actual', stroke: '#0D0D0D', strokeWidth: 2, dot: {r:3} }),
                      h(RC.Line, { type: 'monotone', dataKey: 'Predicted', stroke: '#C8973A', strokeWidth: 2, strokeDasharray: '5 3', dot: {r:3} })
                    )
                  )
                ),
                h('table', { className: 'history-table', style: {marginTop:24} },
                  h('thead', null, h('tr', null,
                    h('th',null,'Season'), h('th',null,'Actual 3PT%'), h('th',null,'Predicted'), h('th',null,'Diff'), h('th',null,'3PA/G'), h('th',null,'GP')
                  )),
                  h('tbody', null,
                    playerData.history.map(function(hh) {
                      var diff = hh.predicted_fg3_pct - hh.actual_fg3_pct;
                      return h('tr', { key: hh.season },
                        h('td',null,hh.season),
                        h('td',null,(hh.actual_fg3_pct*100).toFixed(1)+'%'),
                        h('td',null,(hh.predicted_fg3_pct*100).toFixed(1)+'%'),
                        h('td',{className:diff>=0?'diff-pos':'diff-neg'},(diff>=0?'+':'')+(diff*100).toFixed(1)+'%'),
                        h('td',null,hh.fg3a_per_game),
                        h('td',null,hh.games_played)
                      );
                    })
                  )
                )
              )
        )
      );
    }

    // ── PredictTab ─────────────────────────────────────────────────────
    function PredictTab() {
      var fs = React.useState({ fg3_pct_last_season:0.370, fg3a_per_game:6.0, games_played:70, minutes_per_game:32.0, fg_pct:0.470, ft_pct:0.850, usg_pct:24.0, ast_per_game:4.0, tov_per_game:2.5, seasons_in_league:5 });
      var form = fs[0]; var setForm = fs[1];
      var rs = React.useState(null); var result = rs[0]; var setResult = rs[1];
      var ls = React.useState(false); var loading = ls[0]; var setLoading = ls[1];
      var es = React.useState(''); var error = es[0]; var setError = es[1];

      function set(k, v) { setForm(function(f){ var n = Object.assign({}, f); n[k] = parseFloat(v)||0; return n; }); }

      function predict() {
        setLoading(true); setError(''); setResult(null);
        fetch(API + '/predict', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form) })
          .then(function(r){ if(!r.ok) throw new Error('Prediction failed'); return r.json(); })
          .then(function(d){ setResult(d); })
          .catch(function(e){ setError(e.message); })
          .finally(function(){ setLoading(false); });
      }

      function inp(label, key, step) {
        return h('div', { className: 'form-group' },
          h('label', { className: 'form-label' }, label),
          h('input', { className: 'form-input', type: 'number', step: step||1, value: form[key], onChange: function(e){ set(key, e.target.value); } })
        );
      }

      return h('div', { className: 'cols' },
        h('div', { className: 'card' },
          h('div', { className: 'card__title' }, 'Player Stats'),
          h('div', { className: 'form-row-2' }, inp('3PT% Last Season','fg3_pct_last_season','0.001'), inp('3PA per Game','fg3a_per_game','0.1')),
          h('div', { className: 'form-row-2' }, inp('Games Played','games_played','1'), inp('Minutes / Game','minutes_per_game','0.1')),
          h('div', { className: 'form-row-2' }, inp('FG% (Overall)','fg_pct','0.001'), inp('FT%','ft_pct','0.001')),
          h('div', { className: 'form-row-2' }, inp('Usage Rate %','usg_pct','0.1'), inp('Assists / Game','ast_per_game','0.1')),
          h('div', { className: 'form-row-2' }, inp('Turnovers / Game','tov_per_game','0.1'), inp('Seasons in League','seasons_in_league','1')),
          h('button', { className: 'btn-predict', onClick: predict, disabled: loading },
            loading ? h('span', { className: 'spinner' }) : 'Forecast Next Season 3PT%'
          ),
          error && h('div', { className: 'error-msg' }, error)
        ),
        h('div', null,
          result
            ? h('div', { className: 'card' },
                h('div', { className: 'card__title' }, 'Forecast Result'),
                h('div', { className: 'result-badge' },
                  h('div', { className: 'result-pct' }, result.predicted_fg3_pct_percent + '%'),
                  h('div', { className: 'result-label' }, 'Predicted 3PT% - Next Season')
                ),
                h('table', { className: 'history-table', style:{marginTop:20} },
                  h('thead', null, h('tr', null, h('th',null,'Input Stat'), h('th',null,'Value'))),
                  h('tbody', null,
                    h('tr',null,h('td',null,'3PT% Last Season'),h('td',null,(result.input.fg3_pct_last_season*100).toFixed(1)+'%')),
                    h('tr',null,h('td',null,'3PA / Game'),h('td',null,result.input.fg3a_per_game)),
                    h('tr',null,h('td',null,'FG%'),h('td',null,(result.input.fg_pct*100).toFixed(1)+'%')),
                    h('tr',null,h('td',null,'FT%'),h('td',null,(result.input.ft_pct*100).toFixed(1)+'%')),
                    h('tr',null,h('td',null,'Usage Rate'),h('td',null,result.input.usg_pct+'%')),
                    h('tr',null,h('td',null,'Games Played'),h('td',null,result.input.games_played))
                  )
                )
              )
            : h('div', { className: 'card' },
                h('div', { className: 'card__title' }, 'Forecast Result'),
                h('div', { className: 'empty-state' },
                  h('div', { className: 'empty-ball' }, '📊'),
                  h('div', { className: 'empty-text' }, "Fill in a player's stats and click Forecast to get their predicted 3PT% for next season")
                )
              ),
          h('div', { className: 'card', style:{marginTop:20} },
            h('div', { className: 'card__title' }, 'What drives the model'),
            h('div', { className: 'feat-list' },
              IMPORTANCES.map(function(item) {
                return h('div', { key: item.key, className: 'feat-row' },
                  h('div', { className: 'feat-name' }, FEATURE_LABELS[item.key] || item.key),
                  h('div', { className: 'feat-bar-bg' }, h('div', { className: 'feat-bar-fill', style:{width:((item.val/0.133)*100)+'%'} })),
                  h('div', { className: 'feat-val' }, (item.val*100).toFixed(0)+'%')
                );
              })
            )
          )
        )
      );
    }

    // ── App ────────────────────────────────────────────────────────────
    function App() {
      var ts = React.useState('players'); var tab = ts[0]; var setTab = ts[1];
      var ms = React.useState(null); var modelInfo = ms[0]; var setModel = ms[1];

      React.useEffect(function() {
        fetch(API + '/model-info').then(function(r){ return r.json(); }).then(setModel).catch(function(){});
      }, []);

      return h('div', null,
        h('header', { className: 'site-header' },
          h('div', { className: 'logo' }, '3PT', h('span', null, 'Cast')),
          h('nav', { className: 'nav-tabs' },
            h('button', { className: 'nav-tab' + (tab==='players'?' active':''), onClick: function(){ setTab('players'); } }, 'Player History'),
            h('button', { className: 'nav-tab' + (tab==='predict'?' active':''), onClick: function(){ setTab('predict'); } }, 'Custom Forecast')
          )
        ),
        h('main', { className: 'page' },
          h('div', { className: 'hero-strip' },
            h('div', { className: 'hero-stat' }, h('div',{className:'hero-stat__label'},'Model Type'), h('div',{className:'hero-stat__value',style:{fontSize:'1.2rem',paddingTop:6}},'XGBoost'), h('div',{className:'hero-stat__sub'},'Regressor')),
            h('div', { className: 'hero-stat' }, h('div',{className:'hero-stat__label'},'Mean Abs. Error'), h('div',{className:'hero-stat__value'},'2.76pts'), h('div',{className:'hero-stat__sub'},'percentage points')),
            h('div', { className: 'hero-stat' }, h('div',{className:'hero-stat__label'},'R2 Score'), h('div',{className:'hero-stat__value'},'0.303'), h('div',{className:'hero-stat__sub'},'on held-out seasons')),
            h('div', { className: 'hero-stat' }, h('div',{className:'hero-stat__label'},'Dataset'), h('div',{className:'hero-stat__value'},'3.1K'), h('div',{className:'hero-stat__sub'},'player-seasons 2014-24'))
          ),
          tab === 'players' && h(PlayerTab, { modelInfo: modelInfo }),
          tab === 'predict' && h(PredictTab, null)
        )
      );
    }

    ReactDOM.render(h(App, null), document.getElementById('root'));
  </script>
</body>
</html>
